
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARO - Terminal</title>
    <!-- Glitter Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #000; 
            color: #f0f; /* Changed from green to neon pink */
            font-family: 'Courier New', Courier, monospace;
            padding: 20px; margin: 0;
        }
        h1 { text-align: center; border-bottom: 1px solid #f0f; padding-bottom: 10px; font-size: 24px; }
        .setup-screen, .game-screen { display: flex; flex-direction: column; gap: 15px; max-width: 600px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        label { display: block; margin-bottom: 5px; }
        input, button {
            background: #000; border: 1px solid #f0f; color: #f0f;
            padding: 10px; font-family: 'Courier New', Courier, monospace;
            font-size: 16px; margin-bottom: 10px; width: 100%; max-width: 320px; transition: all 0.2s;
        }
        button { max-width: 100%; font-weight: bold; }
        button:hover:not(:disabled) { background: #303; cursor: pointer; } /* Dark pink hover */
        button:disabled { border-color: #333; color: #333; cursor: not-allowed; }
        
        .columns { display: flex; justify-content: space-between; gap: 20px; margin-top: 20px; }
        .column { flex: 1; border: 1px solid #f0f; padding: 10px; height: 250px; overflow-y: auto; }
        .status { border: 1px dashed #f0f; padding: 10px; min-height: 20px; margin-top: 10px; word-wrap: break-word; }
        .win-history { margin-top: 20px; border-top: 1px solid #f0f; padding-top: 10px; }
        .history-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 10px; }
        
        .reset-btn { border-color: #f00; color: #f00; font-size: 14px; padding: 8px; width: auto; }
        .reset-btn:hover:not(:disabled) { background: #300; }
        .secret-display { color: #ff0; font-weight: bold; }
        .heart-icon { color: #f0f; text-shadow: 0 0 8px #f0f; } /* Pink glowing hearts */

        /* Win Overlay Modal Styling */
        #winModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            border: 2px dashed #f0f; padding: 30px; background: #000;
            max-width: 500px; width: 100%; text-align: center;
        }
        #winMessageText { color: #ff0; text-shadow: 0 0 10px #ff0; font-size: 28px; margin-top: 0; }
        .code-reveal { font-size: 20px; margin: 10px 0; color: #fff; }
        .code-reveal span { color: #f0f; font-weight: bold; font-size: 24px; }

        @media (max-width: 600px) {
            input { max-width: 100%; }
            .columns { flex-direction: column; gap: 10px; }
            .column { height: 200px; }
            .history-controls { flex-direction: column; align-items: flex-start; }
            .reset-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- WIN OVERLAY -->
    <div id="winModal" class="hidden">
        <div class="modal-content">
            <h1 id="winMessageText"></h1>
            <div style="border-top: 1px solid #f0f; border-bottom: 1px solid #f0f; padding: 15px 0; margin: 20px 0;">
                <div id="myCodeReveal" class="code-reveal"></div>
                <div id="oppCodeReveal" class="code-reveal"></div>
            </div>
            <button id="closeWinModalBtn">CONTINUE</button>
        </div>
    </div>

    <h1>=== <span class="heart-icon">❤️</span> DARO TERMINAL <span class="heart-icon">❤️</span> ===</h1>

    <div id="setupScreen" class="setup-screen">
        <div>
            <label>ENTER YOUR NAME: </label>
            <input type="text" id="playerNameInput" placeholder="Player">
        </div>
        <div>
            <button id="hostBtn" disabled>HOST GAME (GET CONNECTION ID)</button>
        </div>
        <div style="margin-top: 15px;">
            <label>CONNECT TO ROOM ID: </label>
            <input type="text" id="peerIdInput" placeholder="Enter Connection ID">
            <button id="joinBtn" disabled>JOIN GAME</button>
        </div>
        <div id="connectionStatus" class="status">Status: Enter your name to begin...</div>
    </div>

    <div id="gameScreen" class="game-screen hidden">
        <div>ROOM ID: <span id="displayPeerId" style="color: #fff; font-weight: bold;"></span></div>
        <div id="secretCodeDisplay">SECRET CODE: <span id="displaySecretNumber" class="secret-display">NOT LOCKED YET</span></div>
        <div id="turnIndicator" class="status">Connecting...</div>

        <div id="lockSection" class="hidden">
            <label>LOCK YOUR 4-DIGIT NUMBER: </label>
            <input type="password" id="lockInput" maxlength="4" placeholder="****" inputmode="numeric">
            <button id="lockBtn">LOCK</button>
        </div>

        <div id="guessSection" class="hidden">
            <label>ENTER 4-DIGIT GUESS: </label>
            <input type="text" id="guessInput" maxlength="4" placeholder="1234" inputmode="numeric">
            <button id="guessBtn">SUBMIT GUESS</button>
        </div>

        <div class="columns">
            <div class="column">
                <h3 style="margin-top: 0;">YOUR GUESSES</h3>
                <div id="myLogs"></div>
            </div>
            <div class="column">
                <h3 style="margin-top: 0;">OPPONENT GUESSES</h3>
                <div id="oppLogs"></div>
            </div>
        </div>

        <div class="win-history">
            <h3 style="margin-bottom: 5px;">WIN HISTORY</h3>
            <div class="history-controls">
                <div id="winHistoryLog">Awaiting setup...</div>
                <button id="resetScoresBtn" class="reset-btn">RESET ALL SCORES</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // ==========================================
        // YOUR FIREBASE CONFIGURATION 
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyA-7Du9BR1hyC1Y-_ZxRNzLtdmuehQiwek",
            authDomain: "daro-game.firebaseapp.com",
            databaseURL: "https://daro-game-default-rtdb.firebaseio.com",
            projectId: "daro-game",
            storageBucket: "daro-game.firebasestorage.app",
            messagingSenderId: "597207359398",
            appId: "1:597207359398:web:96b71d4584194d82eaf967"
        };
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "";
        let oppName = "Opponent";
        let mySecretNum = "";
        let oppSecretNum = "";
        let myTurn = false;
        let isHost = false; 
        let winHistory = {};
        let roundStarter = true; 
        
        let myInboxRef = null;
        let oppInboxRef = null;

        const setupScreen = document.getElementById('setupScreen');
        const gameScreen = document.getElementById('gameScreen');
        const connStatus = document.getElementById('connectionStatus');
        const turnIndicator = document.getElementById('turnIndicator');
        const lockSection = document.getElementById('lockSection');
        const guessSection = document.getElementById('guessSection');
        const playerNameInput = document.getElementById('playerNameInput');
        const hostBtn = document.getElementById('hostBtn');
        const joinBtn = document.getElementById('joinBtn');
        const winModal = document.getElementById('winModal');

        playerNameInput.addEventListener('input', (e) => {
            const hasName = e.target.value.trim().length > 0;
            hostBtn.disabled = !hasName;
            joinBtn.disabled = !hasName;
            if (hasName && connStatus.innerText.includes("Enter your name")) {
                connStatus.innerText = "Status: Ready to Host or Join.";
            } else if (!hasName) {
                connStatus.innerText = "Status: Enter your name to begin...";
            }
        });

        function generateShortId() {
            return Math.random().toString(36).substring(2, 7).toUpperCase();
        }

        function sendToOpponent(data) {
            if (oppInboxRef) push(oppInboxRef, data);
        }

        // --- GLITTER & WIN DISPLAY FUNCTION ---
        function showWinScreen(winnerName, loserName, myCode, oppCode) {
            // Trigger Pink/White Confetti Burst
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.5 },
                colors: ['#ff00ff', '#ff69b4', '#ffc0cb', '#ffffff']
            });

            // Populate Modal Text
            document.getElementById('winMessageText').innerHTML = `${winnerName} ❤️ ${loserName}<br><br>${winnerName.toUpperCase()} WINS!`;
            document.getElementById('myCodeReveal').innerHTML = `${myName.toUpperCase()}'S CODE: <span>${myCode}</span>`;
            document.getElementById('oppCodeReveal').innerHTML = `${oppName.toUpperCase()}'S CODE: <span>${oppCode}</span>`;
            
            // Show Modal
            winModal.classList.remove('hidden');
        }

        // Close Modal Button
        document.getElementById('closeWinModalBtn').onclick = () => {
            winModal.classList.add('hidden');
        };

        hostBtn.onclick = async () => {
            myName = playerNameInput.value.trim();
            isHost = true;
            connStatus.innerText = "Status: Creating secure Cloud Room...";
            
            const shortRoomId = generateShortId();
            
            myInboxRef = ref(db, `rooms/${shortRoomId}/host_inbox`);
            oppInboxRef = ref(db, `rooms/${shortRoomId}/guest_inbox`);
            
            await remove(ref(db, `rooms/${shortRoomId}`));

            document.getElementById('displayPeerId').innerText = shortRoomId;
            setupScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            turnIndicator.innerText = "Waiting for an opponent to join the cloud room...";

            onChildAdded(myInboxRef, (snapshot) => {
                handleIncomingData(snapshot.val());
            });
        };

        joinBtn.onclick = () => {
            myName = playerNameInput.value.trim();
            isHost = false;
            const targetId = document.getElementById('peerIdInput').value.trim().toUpperCase();
            if (!targetId) return alert("Please enter the Room ID first.");
            
            connStatus.innerText = "Status: Connecting to Cloud Room...";
            
            myInboxRef = ref(db, `rooms/${targetId}/guest_inbox`);
            oppInboxRef = ref(db, `rooms/${targetId}/host_inbox`);

            document.getElementById('displayPeerId').innerText = targetId;
            setupScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            turnIndicator.innerText = "Connecting to Host...";

            onChildAdded(myInboxRef, (snapshot) => {
                handleIncomingData(snapshot.val());
            });

            sendToOpponent({ type: 'INIT', name: myName });
        };

        function handleIncomingData(data) {
            if (data.type === 'INIT') {
                oppName = data.name;
                turnIndicator.innerText = `Connected to ${oppName}. Please lock your 4-digit number.`;
                lockSection.classList.remove('hidden');
                initWinHistory();
                
                if (isHost) sendToOpponent({ type: 'INIT_ACK', name: myName });
            }
            if (data.type === 'INIT_ACK') {
                oppName = data.name;
                turnIndicator.innerText = `Connected to ${oppName}. Please lock your 4-digit number.`;
                lockSection.classList.remove('hidden');
                initWinHistory();
            }
            if (data.type === 'LOCKED') {
                oppSecretNum = data.number;
                if (mySecretNum) startMatch();
            }
            if (data.type === 'GUESS') {
                evaluateOpponentGuess(data.guess);
            }
            if (data.type === 'RESET_SCORES') {
                processScoreReset(false);
            }
        }

        function initWinHistory() {
            const saved = localStorage.getItem('daro_history_v2');
            if (saved) winHistory = JSON.parse(saved);
            if (!winHistory[myName]) winHistory[myName] = 0;
            if (!winHistory[oppName]) winHistory[oppName] = 0;
            updateWinHistoryUI();
        }

        document.getElementById('lockBtn').onclick = () => {
            const val = document.getElementById('lockInput').value.trim();
            if (val.length !== 4 || isNaN(val)) return alert("Error: Must be exactly 4 digits.");
            
            mySecretNum = val;
            document.getElementById('displaySecretNumber').innerText = val;
            lockSection.classList.add('hidden');
            
            sendToOpponent({ type: 'LOCKED', number: val });
            
            if (oppSecretNum) {
                startMatch();
            } else {
                turnIndicator.innerText = `Number locked. Waiting for ${oppName} to lock theirs...`;
            }
        };

        function startMatch() {
            myTurn = isHost ? roundStarter : !roundStarter; 
            updateTurnUI();
            guessSection.classList.remove('hidden');
        }

        document.getElementById('guessBtn').onclick = () => {
            if (!myTurn) return alert("Wait! It's your opponent's turn.");
            const guess = document.getElementById('guessInput').value.trim();
            if (guess.length !== 4 || isNaN(guess)) return alert("Error: Enter a 4-digit guess.");

            let correct = 0;
            for (let i = 0; i < 4; i++) { if (guess[i] === oppSecretNum[i]) correct++; }

            if (correct === 4) {
                // I WIN
                let savedMyCode = mySecretNum;
                let savedOppCode = oppSecretNum;
                
                winHistory[myName]++;
                saveAndRefreshHistory();
                sendToOpponent({ type: 'GUESS', guess: guess });
                resetRound(); 
                
                showWinScreen(myName, oppName, savedMyCode, savedOppCode);
                return;
            } 
            
            let msg = correct > 0 ? `${correct} digit${correct > 1 ? 's' : ''} correct` : "Try again";
            alert(`Your Guess (${guess}): ${msg}`);
            logToColumn('myLogs', `${guess} -> ${msg}`);
            
            sendToOpponent({ type: 'GUESS', guess: guess });
            myTurn = false;
            updateTurnUI();
            document.getElementById('guessInput').value = "";
        };

        function evaluateOpponentGuess(guess) {
            let correct = 0;
            for (let i = 0; i < 4; i++) { if (guess[i] === mySecretNum[i]) correct++; }

            if (correct === 4) {
                // OPPONENT WINS
                let savedMyCode = mySecretNum;
                let savedOppCode = oppSecretNum;
                
                winHistory[oppName]++;
                saveAndRefreshHistory();
                resetRound();
                
                showWinScreen(oppName, myName, savedMyCode, savedOppCode);
                return;
            } 
            
            let msg = correct > 0 ? `${correct} digit${correct > 1 ? 's' : ''} correct` : "Try again";
            logToColumn('oppLogs', `${guess} -> ${msg}`);
            myTurn = true;
            updateTurnUI();
        }

        function updateTurnUI() { turnIndicator.innerText = myTurn ? "YOUR TURN: Enter a guess." : `Waiting for ${oppName} to guess...`; }
        function logToColumn(id, text) { document.getElementById(id).innerHTML += `<div>> ${text}</div>`; }
        function saveAndRefreshHistory() { localStorage.setItem('daro_history_v2', JSON.stringify(winHistory)); updateWinHistoryUI(); }
        function updateWinHistoryUI() { document.getElementById('winHistoryLog').innerText = `${myName.toUpperCase()}: ${winHistory[myName] || 0} Wins | ${oppName.toUpperCase()}: ${winHistory[oppName] || 0} Wins`; }
        
        document.getElementById('resetScoresBtn').onclick = () => {
            if (confirm("Clear scoreboard for this session?")) { processScoreReset(true); }
        };

        function processScoreReset(isInitiator) {
            winHistory[myName] = 0; winHistory[oppName] = 0;
            saveAndRefreshHistory();
            if (isInitiator) sendToOpponent({ type: 'RESET_SCORES' });
        }

        function resetRound() {
            mySecretNum = ""; oppSecretNum = "";
            document.getElementById('myLogs').innerHTML = ""; document.getElementById('oppLogs').innerHTML = "";
            document.getElementById('lockInput').value = ""; document.getElementById('guessInput').value = "";
            document.getElementById('displaySecretNumber').innerText = "NOT LOCKED YET";
            lockSection.classList.remove('hidden'); 
            guessSection.classList.add('hidden');
            roundStarter = !roundStarter;
            turnIndicator.innerText = "Round over. Lock a new number to start a new match!";
        }
    </script>
</body>
</html>
