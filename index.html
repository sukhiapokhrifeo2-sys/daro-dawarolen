<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARO - Terminal</title>
    <!-- Glitter Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #000; 
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='25' y='25' font-size='20' fill='%23ffb6c1' fill-opacity='0.08' text-anchor='middle' dominant-baseline='middle' font-family='Courier New, monospace'%3E%E2%99%A5%3C/text%3E%3Ctext x='75' y='75' font-size='20' fill='%23ffb6c1' fill-opacity='0.08' text-anchor='middle' dominant-baseline='middle' font-family='Courier New, monospace'%3E%E2%99%A5%3C/text%3E%3C/svg%3E");
            color: #ffb6c1; 
            font-family: 'Courier New', Courier, monospace;
            padding: 20px; margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        h1 { text-align: center; border-bottom: 1px solid #ffb6c1; padding-bottom: 10px; font-size: 24px; }
        .setup-screen, .game-screen { display: flex; flex-direction: column; gap: 15px; max-width: 600px; margin: 0 auto; background: rgba(0, 0, 0, 0.7); border-radius: 8px; padding: 10px; }
        .hidden { display: none !important; }
        
        label { display: block; margin-bottom: 5px; }
        input, button {
            background: #000; border: 1px solid #ffb6c1; color: #ffb6c1;
            padding: 10px; font-family: 'Courier New', Courier, monospace;
            font-size: 16px; margin-bottom: 10px; width: 100%; max-width: 320px; transition: all 0.2s;
        }
        button { max-width: 100%; font-weight: bold; }
        button:hover:not(:disabled) { background: #3a1723; cursor: pointer; } 
        button:disabled { border-color: #333; color: #333; cursor: not-allowed; }
        
        .columns { display: flex; justify-content: space-between; gap: 20px; margin-top: 20px; }
        .column { flex: 1; border: 1px solid #ffb6c1; padding: 10px; height: 250px; overflow-y: auto; background: rgba(0, 0, 0, 0.85); }
        .status { border: 1px dashed #ffb6c1; padding: 10px; min-height: 20px; margin-top: 10px; word-wrap: break-word; background: rgba(0, 0, 0, 0.85); }
        .win-history { margin-top: 20px; border-top: 1px solid #ffb6c1; padding-top: 10px; }
        .history-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 10px; }
        
        .reset-btn { border-color: #f00; color: #f00; font-size: 14px; padding: 8px; width: auto; }
        .reset-btn:hover:not(:disabled) { background: #300; }
        .secret-display { color: #ff0; font-weight: bold; }
        
        .heart-icon { color: #ffb6c1 !important; text-shadow: 0 0 2px #ffb6c1; font-family: sans-serif; display: inline-block; } 

        /* Small Retro Modal Styling */
        #winModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        #winModalContent {
            border: 1px solid #ffb6c1; padding: 20px; background: #000;
            max-width: 350px; width: 100%; text-align: center; position: relative;
        }
        #winMessageText { font-size: 18px; margin-top: 0; margin-bottom: 15px; }
        .code-reveal { font-size: 14px; margin: 5px 0; color: #fff; }
        .code-reveal span { font-weight: bold; }
        
        #sadEmojiContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1001; }
        .sad-face { position: absolute; top: -50px; color: #ffb6c1; font-size: 22px; pointer-events: none; animation: slowFall linear forwards; }
        @keyframes slowFall { 0% { transform: translateY(0); } 100% { transform: translateY(110vh); } }

        @media (max-width: 600px) {
            input { max-width: 100%; }
            .columns { flex-direction: column; gap: 10px; }
            .column { height: 200px; }
            .history-controls { flex-direction: column; align-items: flex-start; }
            .reset-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="winModal" class="hidden">
        <div id="sadEmojiContainer"></div>
        <div id="winModalContent">
            <h1 id="winMessageText"></h1>
            <div id="myCodeReveal" class="code-reveal"></div>
            <div id="oppCodeReveal" class="code-reveal"></div>
            <button id="closeWinModalBtn" style="margin-top: 15px;">CONTINUE</button>
        </div>
    </div>

    <h1><span class="heart-icon">&#x2665;&#xFE0E;</span> DARO TERMINAL <span class="heart-icon">&#x2665;&#xFE0E;</span></h1>

    <!-- Setup/Game Screens... same as before -->
    <div id="setupScreen" class="setup-screen">
        <div><label>ENTER YOUR NAME: </label><input type="text" id="playerNameInput" placeholder="Player"></div>
        <div><button id="hostBtn" disabled>HOST GAME</button></div>
        <div style="margin-top: 15px;"><label>CONNECT TO ROOM ID: </label><input type="text" id="peerIdInput" placeholder="Enter ID"><button id="joinBtn" disabled>JOIN GAME</button></div>
        <div id="connectionStatus" class="status">Status: Enter your name...</div>
    </div>

    <div id="gameScreen" class="game-screen hidden">
        <div>ROOM ID: <span id="displayPeerId" style="color: #fff; font-weight: bold;"></span></div>
        <div id="secretCodeDisplay">SECRET CODE: <span id="displaySecretNumber" class="secret-display">NOT LOCKED YET</span></div>
        <div id="turnIndicator" class="status">Connecting...</div>
        <div id="lockSection" class="hidden"><label>LOCK YOUR 4-DIGIT NUMBER: </label><input type="password" id="lockInput" maxlength="4" placeholder="****" inputmode="numeric"><button id="lockBtn">LOCK</button></div>
        <div id="guessSection" class="hidden"><label>ENTER 4-DIGIT GUESS: </label><input type="text" id="guessInput" maxlength="4" placeholder="1234" inputmode="numeric"><button id="guessBtn">SUBMIT GUESS</button></div>
        <div class="columns">
            <div class="column"><h3 style="margin-top: 0;">YOUR GUESSES</h3><div id="myLogs"></div></div>
            <div class="column"><h3 style="margin-top: 0;">OPPONENT GUESSES</h3><div id="oppLogs"></div></div>
        </div>
        <div class="win-history"><h3 style="margin-bottom: 5px;">WIN HISTORY</h3><div class="history-controls"><div id="winHistoryLog">Awaiting setup...</div><button id="resetScoresBtn" class="reset-btn">RESET ALL SCORES</button></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-7Du9BR1hyC1Y-_ZxRNzLtdmuehQiwek",
            authDomain: "daro-game.firebaseapp.com",
            databaseURL: "https://daro-game-default-rtdb.firebaseio.com",
            projectId: "daro-game",
            storageBucket: "daro-game.firebasestorage.app",
            messagingSenderId: "597207359398",
            appId: "1:597207359398:web:96b71d4584194d82eaf967"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "", oppName = "Opponent", mySecretNum = "", oppSecretNum = "", myTurn = false, isHost = false, winHistory = {}, roundStarter = true, activeEffectInterval = null, myInboxRef = null, oppInboxRef = null;

        const setupScreen = document.getElementById('setupScreen'), gameScreen = document.getElementById('gameScreen'), connStatus = document.getElementById('connectionStatus'), turnIndicator = document.getElementById('turnIndicator'), lockSection = document.getElementById('lockSection'), guessSection = document.getElementById('guessSection'), playerNameInput = document.getElementById('playerNameInput'), hostBtn = document.getElementById('hostBtn'), joinBtn = document.getElementById('joinBtn'), winModal = document.getElementById('winModal'), sadEmojiContainer = document.getElementById('sadEmojiContainer');

        playerNameInput.addEventListener('input', (e) => {
            const hasName = e.target.value.trim().length > 0;
            hostBtn.disabled = !hasName; joinBtn.disabled = !hasName;
        });

        function generateShortId() { return Math.random().toString(36).substring(2, 7).toUpperCase(); }
        function sendToOpponent(data) { if (oppInboxRef) push(oppInboxRef, data); }

        function showWinScreen(winnerName, loserName, myCode, oppCode, amIWinner) {
            const titleColor = amIWinner ? "#e0bfb8" : "#9dc183";
            const msgEl = document.getElementById('winMessageText');
            msgEl.innerHTML = `${winnerName} <span class="heart-icon">&#x2665;&#xFE0E;</span> ${loserName}<br>${winnerName.toUpperCase()} WINS!`;
            msgEl.style.color = titleColor;
            
            document.getElementById('myCodeReveal').innerHTML = `${myName.toUpperCase()}'S CODE: <span>${myCode}</span>`;
            document.getElementById('oppCodeReveal').innerHTML = `${oppName.toUpperCase()}'S CODE: <span>${oppCode}</span>`;
            
            if (amIWinner) {
                activeEffectInterval = setInterval(() => { confetti({ particleCount: 50, spread: 150, origin: { x: Math.random(), y: Math.random() }, colors: ['#ffb6c1', '#ffffff'], scalar: 0.4, gravity: 0.4 }); }, 500);
            } else {
                activeEffectInterval = setInterval(() => {
                    const face = document.createElement('div'); face.innerText = [':(', 'T_T', ';_;', 'x_x'][Math.floor(Math.random()*4)]; face.className = 'sad-face';
                    face.style.left = Math.random() * 100 + 'vw'; face.style.animationDuration = (Math.random() * 5 + 10) + 's';
                    sadEmojiContainer.appendChild(face); setTimeout(() => { if(face.parentNode) face.remove() }, 20000);
                }, 500);
            }
            winModal.classList.remove('hidden');
        }

        document.getElementById('closeWinModalBtn').onclick = () => { winModal.classList.add('hidden'); sadEmojiContainer.innerHTML = ''; if (activeEffectInterval) clearInterval(activeEffectInterval); };

        hostBtn.onclick = async () => {
            myName = playerNameInput.value.trim(); isHost = true;
            const shortRoomId = generateShortId();
            myInboxRef = ref(db, `rooms/${shortRoomId}/host_inbox`);
            oppInboxRef = ref(db, `rooms/${shortRoomId}/guest_inbox`);
            await remove(ref(db, `rooms/${shortRoomId}`));
            document.getElementById('displayPeerId').innerText = shortRoomId;
            setupScreen.classList.add('hidden'); gameScreen.classList.remove('hidden');
            onChildAdded(myInboxRef, (snapshot) => { handleIncomingData(snapshot.val()); });
        };

        joinBtn.onclick = () => {
            myName = playerNameInput.value.trim(); isHost = false;
            const targetId = document.getElementById('peerIdInput').value.trim().toUpperCase();
            myInboxRef = ref(db, `rooms/${targetId}/guest_inbox`);
            oppInboxRef = ref(db, `rooms/${targetId}/host_inbox`);
            document.getElementById('displayPeerId').innerText = targetId;
            setupScreen.classList.add('hidden'); gameScreen.classList.remove('hidden');
            onChildAdded(myInboxRef, (snapshot) => { handleIncomingData(snapshot.val()); });
            sendToOpponent({ type: 'INIT', name: myName });
        };

        function handleIncomingData(data) {
            if (data.type === 'INIT' || data.type === 'INIT_ACK') {
                oppName = data.name; turnIndicator.innerText = `Connected to ${oppName}. Please lock your number.`;
                lockSection.classList.remove('hidden');
                if (data.type === 'INIT' && isHost) sendToOpponent({ type: 'INIT_ACK', name: myName });
            }
            if (data.type === 'LOCKED') { oppSecretNum = data.number; if (mySecretNum) startMatch(); }
            if (data.type === 'GUESS') evaluateOpponentGuess(data.guess);
        }

        function calculateCorrect(guess, secret) { let c = 0; for(let i=0; i<4; i++) if(guess[i] === secret[i]) c++; return c; }

        document.getElementById('lockBtn').onclick = () => {
            mySecretNum = document.getElementById('lockInput').value.trim();
            document.getElementById('displaySecretNumber').innerText = mySecretNum; lockSection.classList.add('hidden');
            sendToOpponent({ type: 'LOCKED', number: mySecretNum });
            if (oppSecretNum) startMatch(); else turnIndicator.innerText = `Waiting for ${oppName}...`;
        };

        function startMatch() { myTurn = isHost ? roundStarter : !roundStarter; turnIndicator.innerText = myTurn ? "YOUR TURN" : "OPPONENT'S TURN"; guessSection.classList.remove('hidden'); }

        document.getElementById('guessBtn').onclick = () => {
            const guess = document.getElementById('guessInput').value.trim();
            let correct = calculateCorrect(guess, oppSecretNum);
            alert(`Correct digits: ${correct}`);
            if (correct === 4) { showWinScreen(myName, oppName, mySecretNum, oppSecretNum, true); sendToOpponent({ type: 'GUESS', guess: guess }); resetRound(); }
            else { sendToOpponent({ type: 'GUESS', guess: guess }); myTurn = false; turnIndicator.innerText = "OPPONENT'S TURN"; document.getElementById('guessInput').value = ""; }
        };

        function evaluateOpponentGuess(guess) {
            let correct = calculateCorrect(guess, mySecretNum);
            alert(`${oppName} guessed. Correct: ${correct}`);
            if (correct === 4) { showWinScreen(oppName, myName, mySecretNum, oppSecretNum, false); resetRound(); }
            else { myTurn = true; turnIndicator.innerText = "YOUR TURN"; }
        }

        function resetRound() { 
            mySecretNum = ""; oppSecretNum = ""; lockSection.classList.remove('hidden'); guessSection.classList.add('hidden'); roundStarter = !roundStarter; 
        }
    </script>
</body>
</html>
